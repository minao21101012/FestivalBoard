<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文化祭案内</title>
    <style>
      :root {
        color-scheme: dark;
        --frame: #12151a;
        --frame-2: #1a1f26;
        --panel: #2a3340;
        --panel-2: #344152;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.12);
        --text: #eef4ff;
        --muted: #b5bfd0;
        --blue: #5fa6ff;
        --green: #88dc4f;
        --amber: #ffd76b;
        --pink: #f4a0cf;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 20% 20%, rgba(84, 126, 182, 0.18), transparent 28%),
          radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.06), transparent 20%),
          linear-gradient(180deg, #bfc4ca 0%, #8d9399 28%, #7a8086 100%);
        font-family: "Avenir Next Condensed", "DIN Condensed", "Yu Gothic", "Hiragino Sans", system-ui, sans-serif;
        color: var(--text);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.15), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.1)),
          linear-gradient(transparent, rgba(255, 255, 255, 0.03));
        mix-blend-mode: screen;
        opacity: 0.35;
      }

      .scene {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .monitor {
        width: min(920px, 100%);
        background: linear-gradient(180deg, var(--frame), #090b0f 100%);
        border-radius: 6px;
        box-shadow: var(--shadow);
        padding: 10px;
        position: relative;
      }

      .monitor::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 6px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        pointer-events: none;
      }

      .screen {
        overflow: hidden;
        border-radius: 2px;
        background: linear-gradient(180deg, #252c37 0%, #20262f 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 16px;
        padding: 10px 12px 8px;
        background: linear-gradient(180deg, #171b21 0%, #0f1216 100%);
        border-bottom: 2px solid #36404c;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .icon {
        width: 22px;
        height: 22px;
        border-radius: 3px;
        background: linear-gradient(180deg, #7cf35f 0%, #43b73f 100%);
        position: relative;
        flex: 0 0 auto;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
      }

      .icon::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 7px;
        width: 11px;
        height: 7px;
        border-top: 3px solid #0b2e12;
        border-left: 3px solid #0b2e12;
        transform: rotate(-45deg);
      }

      .title-wrap {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
        white-space: nowrap;
      }

      .title-ja {
        font-size: clamp(18px, 2.8vw, 29px);
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .title-en {
        color: #d0d7e2;
        font-size: clamp(12px, 1.8vw, 19px);
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .clock {
        min-width: 92px;
        padding: 6px 12px 5px;
        border-radius: 2px;
        background: linear-gradient(180deg, #25437a 0%, #172d57 100%);
        border: 1px solid rgba(128, 187, 255, 0.2);
        color: #6fb3ff;
        font-size: clamp(22px, 3.2vw, 30px);
        font-weight: 800;
        letter-spacing: 0.08em;
        text-align: center;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 10px rgba(105, 176, 255, 0.2);
      }

      .board {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
      }

      .table-head,
      .row {
        display: grid;
        grid-template-columns: 0.95fr 0.32fr 2.15fr 0.72fr 1.02fr 1.15fr;
        align-items: center;
        column-gap: 10px;
      }

      .table-head {
        padding: 6px 10px 5px;
        background: linear-gradient(180deg, #303846 0%, #262d38 100%);
        border-bottom: 1px solid var(--line-strong);
        color: #c9d3e2;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .table-head .head-dest {
        text-transform: none;
        letter-spacing: 0.08em;
      }

      .table-head .head-no {
        text-align: left;
      }

      .rows {
        background: linear-gradient(180deg, #2a3140 0%, #262d3a 100%);
      }

      .row {
        min-height: 42px;
        padding: 0 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(0, 0, 0, 0.04));
      }

      .row.row-custom-accent .airline-badge,
      .row.row-custom-accent .no-cell,
      .row.row-custom-accent .event-title,
      .row.row-custom-accent .status-text {
        color: var(--row-accent, #ffd76b) !important;
      }

      .row.row-custom-blink .airline-badge,
      .row.row-custom-blink .no-cell,
      .row.row-custom-blink .event-title,
      .row.row-custom-blink .status-text {
        animation: numberBlink 0.9s steps(2, end) infinite;
      }

      .row:nth-child(2n) {
        background: rgba(255, 255, 255, 0.02);
      }

      .row:nth-child(2n + 1) .gate-cell,
      .row:nth-child(2n + 1) .status-cell {
        background: rgba(255, 255, 255, 0.015);
      }

      .row > div {
        display: flex;
        align-items: center;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-weight: 600;
      }

      .airline-cell {
        gap: 8px;
      }

      .airline-badge {
        width: auto;
        min-width: 96px;
        padding: 0 8px;
        height: 22px;
        display: grid;
        place-items: center;
        border-radius: 2px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
        color: #ffffff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .airline-ana {
        background: linear-gradient(180deg, #fff 0%, #dfefff 100%);
        color: #1b57a8;
      }

      .airline-jal {
        background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
        color: #c73b39;
      }

      .airline-fda {
        background: linear-gradient(180deg, #f4e58b 0%, #e5d44f 100%);
        color: #8f7500;
      }

      .airline-peach {
        background: linear-gradient(180deg, #ffbfd5 0%, #ff9fc1 100%);
        color: #b72d6d;
      }

      .airline-sky {
        background: linear-gradient(180deg, #f6fbff 0%, #d9edf8 100%);
        color: #3177b7;
      }

      .no-cell {
        justify-content: flex-start;
        padding-left: 2px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.08em;
      }

      .event-cell {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        min-width: 0;
      }

      .event-title {
        width: 100%;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.06em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .lang-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #d7dfeb;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
      }

      .event-sub {
        color: #c9d3e1;
        font-size: 11px;
        letter-spacing: 0.08em;
      }

      .status-static {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .gate-cell,
      .status-cell {
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.1;
        text-align: center;
        white-space: normal;
      }

      .gate-number {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0;
        line-height: 1.05;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }

      .status-label {
        margin-top: 1px;
        color: #acb7c7;
        font-size: 10px;
        letter-spacing: 0.08em;
      }

      .time-cell {
        justify-content: center;
        flex-direction: column;
        align-items: center;
        font-size: 18px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.05em;
      }

      .time-main {
        line-height: 1;
      }

      .time-shift-wrap {
        position: relative;
        min-width: 58px;
        height: 1.1em;
        overflow: hidden;
      }

      .time-old,
      .time-new {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      .time-old {
        color: #cfd8e8;
        animation: timeOldOut 3.2s ease-in-out infinite;
      }

      .time-new {
        color: #ffd76b;
        animation: timeNewIn 3.2s ease-in-out infinite;
      }

      .time-delta {
        margin-top: 3px;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: #ffd76b;
      }

      .time-cell.time-shifted {
        color: #ffdf82;
        animation: delayGlow 3.2s ease-in-out infinite;
      }

      .status-cell {
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 4px 0 4px 8px;
      }

      .status-text {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #ffffff;
        line-height: 1.2;
      }

      .status-sub {
        color: #d2d8e3;
        font-size: 10px;
        letter-spacing: 0.08em;
        margin-top: 2px;
        line-height: 1.1;
      }

      .status-boarding .status-text,
      .status-checkin .status-text,
      .status-delayed .status-text,
      .status-lastcall .status-text,
      .status-departed .status-text,
      .status-cancel .status-text {
        color: #ffffff;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 8px 12px 10px;
        background: linear-gradient(180deg, #252b35 0%, #1f252e 100%);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        color: #d2d9e4;
        font-size: 12px;
      }

      .footer-left {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .footer-note {
        font-size: 15px;
        line-height: 1.3;
        color: #edf2fb;
        min-height: 1.25em;
        overflow: hidden;
        max-width: min(60vw, 760px);
      }

      .footer-note-track {
        display: inline-flex;
        align-items: center;
        width: max-content;
        white-space: nowrap;
        will-change: transform;
        animation: noteMarquee var(--note-duration, 22s) linear infinite;
      }

      .footer-note-piece {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .notice-highlight {
        color: #ffd76b;
        font-weight: 700;
      }

      .notice-blinkword {
        animation: numberBlink 0.9s steps(2, end) infinite;
      }

      .footer-right {
        color: #e7edf7;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .divider {
        height: 14px;
        background: #232934;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .sheet-title {
        position: absolute;
        right: 14px;
        bottom: 12px;
        color: #f1f5fb;
        font-size: 12px;
        letter-spacing: 0.08em;
        opacity: 0.9;
      }

      .admin-open {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 20;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(10, 15, 21, 0.86);
        color: #eef4ff;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
      }

      .admin-panel {
        position: fixed;
        right: 16px;
        bottom: 60px;
        z-index: 21;
        width: min(980px, calc(100vw - 24px));
        max-height: calc(100vh - 86px);
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(13, 19, 27, 0.94);
        border-radius: 12px;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.42);
        padding: 12px;
      }

      .admin-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }

      .admin-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .admin-span-2 {
        grid-column: 1 / span 2;
      }

      .admin-grid label {
        font-size: 11px;
        color: #d2d9e4;
        letter-spacing: 0.04em;
      }

      .admin-grid input,
      .admin-grid select {
        width: 100%;
        margin-top: 4px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: #eef4ff;
        border-radius: 6px;
        padding: 7px 8px;
        font-size: 12px;
      }

      .admin-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .admin-actions button {
        flex: 1 1 calc(33.333% - 6px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: #eef4ff;
        border-radius: 7px;
        padding: 8px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .admin-note {
        margin-top: 8px;
        min-height: 1.2em;
        color: #9cd4ff;
        font-size: 11px;
      }

      .admin-sep {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
      }

      .admin-subtitle {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #eef4ff;
        margin-bottom: 8px;
      }

      .blink {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .blink::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #8af55c;
        box-shadow: 0 0 0 0 rgba(138, 245, 92, 0.55);
        animation: pulse 1.8s infinite;
      }

      .row-enter {
        animation: enter 0.5s ease both;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.88);
          box-shadow: 0 0 0 0 rgba(138, 245, 92, 0.55);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 12px rgba(138, 245, 92, 0);
        }
        100% {
          transform: scale(0.88);
          box-shadow: 0 0 0 0 rgba(138, 245, 92, 0);
        }
      }

      @keyframes enter {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes numberBlink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0.35;
        }
      }

      @keyframes delayGlow {
        0%,
        100% {
          text-shadow: 0 0 0 rgba(255, 212, 97, 0);
          transform: translateX(0);
        }
        50% {
          text-shadow: 0 0 10px rgba(255, 212, 97, 0.6);
          transform: translateX(2px);
        }
      }

      @keyframes timeOldOut {
        0%,
        35% {
          transform: translateX(0);
          opacity: 1;
        }
        55%,
        100% {
          transform: translateX(-130%);
          opacity: 0;
        }
      }

      @keyframes timeNewIn {
        0%,
        35% {
          transform: translateX(130%);
          opacity: 0;
        }
        55%,
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes noteMarquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      @media (max-width: 860px) {
        .admin-panel {
          width: min(520px, calc(100vw - 24px));
          max-height: calc(100vh - 72px);
        }

        .admin-grid {
          grid-template-columns: 1fr;
        }

        .admin-span-2 {
          grid-column: auto;
        }

        .admin-actions button {
          flex: 1 1 calc(50% - 4px);
        }

        .monitor {
          padding: 8px;
        }

        .header {
          grid-template-columns: 1fr;
          justify-items: start;
        }

        .table-head {
          display: none;
        }

        .row {
          grid-template-columns: 1fr 1fr;
          padding: 10px 10px 8px;
          row-gap: 4px;
        }

        .airline-cell {
          grid-column: 1 / span 2;
        }

        .no-cell,
        .gate-cell,
        .time-cell,
        .status-cell {
          justify-content: flex-start;
        }

        .event-cell {
          grid-column: 1 / span 2;
        }

        .event-title {
          line-height: 1.15;
        }

        .footer {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene">
      <section class="monitor" aria-label="空港の出発案内モニタ">
        <div class="screen">
          <div class="header">
            <div class="header-left">
              <span class="icon" aria-hidden="true"></span>
              <div class="title-wrap">
                <div class="title-ja">プログラム案内</div>
                <div class="title-en">Program Guide</div>
              </div>
            </div>
            <div class="clock" id="clock">14:08</div>
          </div>

          <div class="board" aria-describedby="board-note">
            <div class="table-head" role="presentation">
              <div id="head-airline">Airline</div>
              <div class="head-no" id="head-no">No.</div>
              <div class="head-dest" id="head-title">開演名</div>
              <div id="head-time">Time</div>
              <div id="head-status">Status</div>
              <div id="head-place">Place</div>
            </div>

            <div class="rows" id="rows"></div>

            <div class="divider" aria-hidden="true"></div>

            <div class="rows" id="rows-2"></div>
          </div>

          <div class="footer" id="board-note">
            <div class="footer-left">
              <div class="blink">文化祭の案内は変更される場合があります</div>
              <div class="footer-note" id="custom-note"></div>
            </div>
            <div class="footer-right" id="last-update">最新情報を表示中</div>
          </div>
        </div>
        <div class="sheet-title">FESTIVAL</div>
      </section>
    </main>

    <button id="admin-open" class="admin-open" hidden>編集</button>

    <section id="admin-panel" class="admin-panel" hidden>
      <div class="admin-title">管理モード（この端末のみ保存）</div>
      <div class="admin-grid">
        <label>
          対象No.
          <select id="admin-no"></select>
        </label>
        <label>
          プログラムNo.（表示）
          <input id="admin-display-no" type="number" min="1" step="1" />
        </label>
        <label>
          公演者（日本語）
          <input id="admin-speaker" type="text" />
        </label>
        <label>
          プログラム名（日本語）
          <input id="admin-title" type="text" />
        </label>
        <label>
          開始時刻
          <input id="admin-time" type="text" placeholder="例: 09:30" />
        </label>
        <label>
          このプログラムの遅延/早発（分）
          <input id="admin-row-delay-minutes" type="number" step="1" value="0" />
        </label>
        <label>
          状態（日本語）
          <select id="admin-status">
            <option value="">(空白)</option>
            <option value="開演前">開演前</option>
            <option value="まもなく開演">まもなく開演</option>
            <option value="開演中">開演中</option>
            <option value="遅延">遅延</option>
            <option value="中止">中止</option>
          </select>
        </label>
        <label>
          全体遅延/早発（分）
          <input id="admin-delay-minutes" type="number" step="1" value="0" />
        </label>
        <label>
          文字色
          <input id="admin-color" type="color" value="#ffd76b" />
        </label>
        <label class="admin-span-2">
          <input id="admin-blink" type="checkbox" />
          点滅させる
        </label>
      </div>
      <div class="admin-actions">
        <button id="admin-save" type="button">保存</button>
        <button id="admin-delay-save" type="button">遅延設定を反映</button>
        <button id="admin-sync-token" type="button">公開同期設定</button>
        <button id="admin-reset" type="button">行を初期化</button>
        <button id="admin-delete" type="button">行を削除</button>
        <button id="admin-undo" type="button">一つ戻す</button>
        <button id="admin-redo" type="button">やり直し</button>

      function encodeBase64Unicode(text) {
        const bytes = new TextEncoder().encode(text);
        let binary = '';
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary);
      }

      async function publishSharedState() {
        const token = getSyncToken();
        if (!token) {
          return { ok: false, reason: 'トークン未設定' };
        }

        const stateText = window.localStorage.getItem(ADMIN_STORAGE_KEY);
        if (!stateText) {
          return { ok: false, reason: '保存データなし' };
        }

        let sha;
        try {
          const current = await fetch(SYNC_FILE_API, {
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: 'application/vnd.github+json'
            }
          });
          if (current.ok) {
            const payload = await current.json();
            sha = payload.sha;
          } else if (current.status === 401 || current.status === 403) {
            return { ok: false, reason: `権限エラー(${current.status})` };
          }
        } catch (error) {
          return { ok: false, reason: 'API接続エラー(GET)' };
        }

        const body = {
          message: `Update board state ${new Date().toISOString()}`,
          content: encodeBase64Unicode(stateText)
        };
        if (sha) {
          body.sha = sha;
        }

        try {
          const response = await fetch(SYNC_FILE_API, {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${token}`,
              Accept: 'application/vnd.github+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });
          if (!response.ok) {
            return { ok: false, reason: `書き込み失敗(${response.status})` };
          }
          return { ok: true, reason: '' };
        } catch (error) {
          return { ok: false, reason: 'API接続エラー(PUT)' };
        }
      }

      function parseDelayMinutesInput(value) {
        const normalized = String(value || '')
          .trim()
          .replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 65248))
          .replace(/[＋]/g, '+')
          .replace(/[－]/g, '-')
          .replace(/\s+/g, '');
        if (!normalized) {
          return 0;
        }
        if (!/^[+-]?\d+$/.test(normalized)) {
          return Number.NaN;
        }
        return Number(normalized);
      }

      async function publishSharedStateWithNote(noteNode, baseMessage) {
        const result = await publishSharedState();
        if (!result.ok) {

          return false;
        }
        setAdminNote(noteNode, `${baseMessage} / 公開同期OK`);
        return true;
      }

        for (const baseUrl of SYNC_FILE_URLS) {
          try {
            const response = await fetch(`${baseUrl}?t=${Date.now()}`, { cache: 'no-store' });
            if (!response.ok) {
              continue;
            }
            const remote = await response.json();
            return remote;
          } catch (error) {
            continue;
          }
        }
        return null;
      }

      function parseClockToMinutes(value) {
        const text = String(value || '').trim();
        const match = text.match(/^(\d{1,2}):(\d{2})$/);
        if (!match) {
          return Number.POSITIVE_INFINITY;
        }

        const hours = Number(match[1]);
        const minutes = Number(match[2]);
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
          return Number.POSITIVE_INFINITY;
        }
        return hours * 60 + minutes;
      }

      function formatMinutesToClock(totalMinutes) {
        const day = 24 * 60;
        const wrapped = ((totalMinutes % day) + day) % day;
        const hours = Math.floor(wrapped / 60);
        const minutes = wrapped % 60;
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
      }

      function applyDelayToTime(baseTime, minutesOffset) {
        const minutes = parseClockToMinutes(baseTime);
        if (!Number.isFinite(minutes)) {
          return baseTime;
        }
        return formatMinutesToClock(minutes + minutesOffset);
      }

        return fallback || 'checkin';

        if (blink) {
          html = html.split(blink).join(`<span class="notice-blinkword">${blink}</span>`);

        return html;

        noticeNode.innerHTML = `
          <span class="footer-note-track" aria-label="${escapeHtml(base)}">
            <span class="footer-note-piece">${rendered}</span>
            <span class="footer-note-piece" aria-hidden="true">${rendered}</span>
          </span>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function rowConfig(no) {
        return rowSettings[String(no)] || {};
      }

      function renderClock() {
        const now = new Date();
        clock.textContent = now.toLocaleTimeString('ja-JP', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      }

      function applyStateFromStorage(next) {
        replaceRowSettings(next.rows || {});
        replaceHiddenNos(next.hiddenNos || []);
        replaceCustomRows(next.customRows || []);
        globalDelayMinutes = Number.isFinite(next.delayMinutes) ? Number(next.delayMinutes) : 0;
        footerNotice = next.notice || { ja: '', en: '', highlight: '', blink: '' };
      }

      function syncStateFromStorage() {
        const latest = loadAdminState();
        applyStateFromStorage(latest);
        renderBoard();
        updateStatus();
      }

      function currentLanguage() {
        return languages[currentLanguageIndex % languages.length];
      }

      function getLocalizedText(source, key) {
        return source[key] || source.ja || '';
      }

      async function translateJaText(text, targetLanguage) {
        const normalized = (text || '').trim();
        if (!normalized) {
          return '';
        }

        const cacheKey = `${targetLanguage}:${normalized}`;
        if (translationCache[cacheKey]) {
          return translationCache[cacheKey];
        }

        try {
          const controller = new AbortController();
          const timeout = window.setTimeout(() => controller.abort(), 5000);
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=${targetLanguage}&dt=t&q=${encodeURIComponent(normalized)}`;
          const response = await fetch(url, { signal: controller.signal });
          window.clearTimeout(timeout);

          if (!response.ok) {
            throw new Error('translate failed');
          }

          const payload = await response.json();
          const translated = (payload[0] || []).map((segment) => segment[0] || '').join('').trim();
          const result = translated || normalized;
          translationCache[cacheKey] = result;
          return result;
        } catch (error) {
          return normalized;
        }
      }

      async function buildAutoTranslations(jaText, existingMap, isSameAsBefore) {
        const next = {};
        if (isSameAsBefore && existingMap && typeof existingMap === 'object') {
          TRANSLATE_TARGETS.forEach((language) => {
            next[language] = existingMap[language] || jaText;
          });
          return next;
        }

        const translated = await Promise.all(
          TRANSLATE_TARGETS.map(async (language) => [language, await translateJaText(jaText, language)])
        );

        translated.forEach(([language, text]) => {
          next[language] = text;
        });
        return next;
      }

      function renderHeaders() {
        const language = currentLanguage().key;
        const [airline, no, title, time, status, place] = headerLabels[language];
        headAirline.textContent = airline;
        headNo.textContent = no;
        headTitle.textContent = title;
        headTime.textContent = time;
        headStatus.textContent = status;
        headPlace.textContent = place;
      }

      function makeRow(item, index) {
        const sourceNo = item.no ?? index + 1;
        const language = currentLanguage();
        const config = rowConfig(sourceNo);
        const displayNo = Number.isFinite(config.displayNo) && Number(config.displayNo) > 0
          ? Math.trunc(Number(config.displayNo))
          : sourceNo;
        const baseTime = config.time || item.time;
        const rowDelayMinutes = Number.isFinite(config.delayMinutes) ? Math.trunc(Number(config.delayMinutes)) : 0;
        const totalDelayMinutes = globalDelayMinutes + rowDelayMinutes;
        const speaker = language.key === 'ja'
          ? (config.speakerJa || getLocalizedText(item.speaker, language.key))
          : ((config.speakerI18n && config.speakerI18n[language.key]) || config.speakerJa || getLocalizedText(item.speaker, language.key));
        const title = language.key === 'ja'
          ? (config.titleJa || getLocalizedText(item.titles, language.key))
          : ((config.titleI18n && config.titleI18n[language.key]) || config.titleJa || getLocalizedText(item.titles, language.key));
        const statusText = language.key === 'ja'
          ? (config.statusJa || getLocalizedText(item.statuses, language.key))
          : ((config.statusI18n && config.statusI18n[language.key]) || config.statusJa || getLocalizedText(item.statuses, language.key));
        const placeText = getLocalizedText(item.gates, language.key);
        const shiftedTime = applyDelayToTime(baseTime, totalDelayMinutes);
        const shiftedClass = totalDelayMinutes !== 0 ? ' time-shifted' : '';
        const delta = delayLabel(totalDelayMinutes);
        const effectiveStatusCode = config.statusCode || item.status;
        const numberClass = 'no-cell';
        const rowClass = `row row-enter${config.color ? ' row-custom-accent' : ''}${config.blink ? ' row-custom-blink' : ''}`;
        const rowStyle = `animation-delay:${index * 40}ms;${config.color ? `--row-accent:${config.color};` : ''}`;
        return `
          <div class="${rowClass}" style="${rowStyle}">
            <div class="airline-cell">
              <span class="airline-badge">${escapeHtml(speaker || '—')}</span>
            </div>
            <div class="${numberClass}">${displayNo}</div>
            <div class="event-cell">
              <div class="event-title">${escapeHtml(title)}</div>
              <span class="lang-chip">${language.label}</span>
            </div>
            <div class="time-cell${shiftedClass}">
              ${totalDelayMinutes === 0
                ? `<span class="time-main">${escapeHtml(shiftedTime)}</span>`
                : `<span class="time-shift-wrap"><span class="time-old">${escapeHtml(baseTime)}</span><span class="time-new">${escapeHtml(shiftedTime)}</span></span>`}
              ${delta ? `<span class="time-delta">${escapeHtml(delta)}</span>` : ''}
            </div>
            <div class="status-cell ${statusClass[effectiveStatusCode] || ''}">
              <span class="status-static">
                <span class="status-text">${escapeHtml(statusText)}</span>
              </span>
            </div>
            <div class="gate-cell">
              <div class="gate-number">${escapeHtml(placeText)}</div>
            </div>
          </div>
        `;
      }

      function setupAdminPanel() {
        if (!isAdminMode) {
          return;
        }

        const openButton = document.getElementById('admin-open');
        const panel = document.getElementById('admin-panel');
        const noField = document.getElementById('admin-no');
        const displayNoField = document.getElementById('admin-display-no');
        const speakerField = document.getElementById('admin-speaker');
        const titleField = document.getElementById('admin-title');
        const timeField = document.getElementById('admin-time');
        const statusField = document.getElementById('admin-status');
        const rowDelayField = document.getElementById('admin-row-delay-minutes');
        const colorField = document.getElementById('admin-color');
        const blinkField = document.getElementById('admin-blink');
        const delayField = document.getElementById('admin-delay-minutes');
        const note = document.getElementById('admin-note');
        const saveButton = document.getElementById('admin-save');
        const delaySaveButton = document.getElementById('admin-delay-save');
        const syncTokenButton = document.getElementById('admin-sync-token');
        const resetButton = document.getElementById('admin-reset');
        const deleteButton = document.getElementById('admin-delete');
        const undoButton = document.getElementById('admin-undo');
        const redoButton = document.getElementById('admin-redo');
        const closeButton = document.getElementById('admin-close');
        const addNoField = document.getElementById('admin-add-no');
        const addSpeakerField = document.getElementById('admin-add-speaker');
        const addTitleField = document.getElementById('admin-add-title');
        const addStatusField = document.getElementById('admin-add-status');
        const addTimeField = document.getElementById('admin-add-time');
        const addPlaceField = document.getElementById('admin-add-place');
        const addButton = document.getElementById('admin-add');
        const noticeJaField = document.getElementById('admin-notice-ja');
        const noticeHighlightField = document.getElementById('admin-notice-highlight');
        const noticeBlinkField = document.getElementById('admin-notice-blink');
        const noticeSaveButton = document.getElementById('admin-notice-save');

        openButton.hidden = false;

        function refreshNoOptions(selectedNo) {
          const items = getAllAdminFlights();
          noField.innerHTML = items
            .map((item) => {
              const config = rowConfig(item.no);
              const displayNo = Number.isFinite(config.displayNo) && Number(config.displayNo) > 0
                ? Math.trunc(Number(config.displayNo))
                : item.no;
              const displayTitle = config.titleJa || item.titles.ja || '新規案内';
              const removedTag = hiddenNos.has(item.no) ? ' [削除中]' : '';
              return `<option value="${item.no}">No.${displayNo} ${escapeHtml(displayTitle)}${removedTag}</option>`;
            })
            .join('');
          if (!items.length) {
            noField.innerHTML = '<option value="">対象なし</option>';
            return;
          }
          const nextNo = selectedNo && items.some((entry) => String(entry.no) === String(selectedNo))
            ? String(selectedNo)
            : String(items[0].no);
          noField.value = nextNo;
        }

        refreshNoOptions();

        function applyForm(no) {
          const item = findAdminFlight(no);
          if (!item) {
            displayNoField.value = '';
            speakerField.value = '';
            titleField.value = '';
            timeField.value = '--:--';
            statusField.value = '';
            rowDelayField.value = '0';
            colorField.value = '#ffd76b';
            blinkField.checked = false;
            delayField.value = String(globalDelayMinutes);
            deleteButton.textContent = '行を削除';
            return;
          }
          const config = rowConfig(no);
          displayNoField.value = String(
            Number.isFinite(config.displayNo) && Number(config.displayNo) > 0
              ? Math.trunc(Number(config.displayNo))
              : item.no
          );
          speakerField.value = config.speakerJa || item.speaker.ja || '';
          titleField.value = config.titleJa || item.titles.ja || '';
          timeField.value = config.time || item.time || '--:--';
          statusField.value = config.statusJa || item.statuses.ja || '';
          rowDelayField.value = String(Number.isFinite(config.delayMinutes) ? Math.trunc(Number(config.delayMinutes)) : 0);
          delayField.value = String(globalDelayMinutes);
          colorField.value = config.color || '#ffd76b';
          blinkField.checked = Boolean(config.blink);
          deleteButton.textContent = hiddenNos.has(item.no) ? '行を復元' : '行を削除';
          note.textContent = '';
        }

        function syncHistoryButtons() {
          undoButton.disabled = historyIndex <= 0;
          redoButton.disabled = historyIndex >= historyStack.length - 1;
        }

        function openPanel() {
          panel.hidden = false;
          refreshNoOptions(noField.value);
          applyForm(noField.value);
          noticeJaField.value = footerNotice.ja || '';
          noticeHighlightField.value = footerNotice.highlight || '';
          noticeBlinkField.value = footerNotice.blink || '';
        }

        function closePanel() {
          panel.hidden = true;
        }

        async function saveCurrent() {
          const no = String(noField.value);
          const item = findAdminFlight(no);
          if (!item) {
            note.textContent = '対象行がありません';
            return;
          }
          const previous = rowConfig(no);
          const requestedDisplayNo = Number(displayNoField.value);
          const speakerJa = speakerField.value.trim();
          const titleJa = titleField.value.trim();
          const baseTime = timeField.value.trim() || '--:--';
          const statusJa = statusField.value;
          const rowDelay = Number(rowDelayField.value || 0);
          const statusCode = statusCodeFromJa(statusJa, item.status);
          const displayNo = Number.isFinite(requestedDisplayNo) && requestedDisplayNo > 0
            ? Math.trunc(requestedDisplayNo)
            : item.no;
          const rowDelayMinutes = Number.isFinite(rowDelay) ? Math.trunc(rowDelay) : 0;

          saveButton.disabled = true;
          delaySaveButton.disabled = true;
          resetButton.disabled = true;
          undoButton.disabled = true;
          redoButton.disabled = true;
          note.textContent = '翻訳中...';

          const [speakerI18n, titleI18n, statusI18n] = await Promise.all([
            buildAutoTranslations(
              speakerJa,
              previous.speakerI18n,
              previous.speakerJa === speakerJa
            ),
            buildAutoTranslations(
              titleJa,
              previous.titleI18n,
              previous.titleJa === titleJa
            ),
            buildAutoTranslations(
              statusJa,
              previous.statusI18n,
              previous.statusJa === statusJa
            )
          ]);

          const next = {
            displayNo,
            speakerJa,
            titleJa,
            statusJa,
            speakerI18n,
            titleI18n,
            statusI18n,
            time: baseTime,
            delayMinutes: rowDelayMinutes,
            statusCode,
            color: colorField.value,
            blink: blinkField.checked
          };

          const isDefault =
            next.displayNo === item.no &&
            next.speakerJa === (item.speaker.ja || '') &&
            next.titleJa === (item.titles.ja || '') &&
            next.time === (item.time || '--:--') &&
            next.statusJa === (item.statuses.ja || '') &&
            next.delayMinutes === 0 &&
            next.statusCode === item.status &&
            next.color === '#ffd76b' &&
            next.blink === false;

          if (isDefault) {
            delete rowSettings[no];
          } else {
            rowSettings[no] = next;
          }

          pushHistorySnapshot();
          saveAdminState();
          await publishSharedStateWithNote(note, '保存しました（多言語を自動更新）');
          renderBoard();
          updateStatus();
          saveButton.disabled = false;
          delaySaveButton.disabled = false;
          resetButton.disabled = false;
          refreshNoOptions(no);
          syncHistoryButtons();
        }

        async function saveDelaySetting() {
          const delay = parseDelayMinutesInput(delayField.value);
          if (!Number.isFinite(delay)) {
            note.textContent = '遅延/早発は数値で入力してください';
            return;
          }

          globalDelayMinutes = Math.trunc(delay);
          pushHistorySnapshot();
          saveAdminState();
          renderBoard();
          updateStatus();
          syncHistoryButtons();

          if (globalDelayMinutes === 0) {
            await publishSharedStateWithNote(note, '遅延設定を0分に戻しました');
          } else if (globalDelayMinutes > 0) {
            await publishSharedStateWithNote(note, `${globalDelayMinutes}分の遅延を反映しました`);
          } else {
            await publishSharedStateWithNote(note, `${Math.abs(globalDelayMinutes)}分の早発を反映しました`);
          }
        }

        async function saveNoticeSetting() {
          const noticeJa = noticeJaField.value.trim();
          const highlight = noticeHighlightField.value.trim();
          const blink = noticeBlinkField.value.trim();

          noticeSaveButton.disabled = true;
          note.textContent = '注意事項を翻訳中...';

          const noticeEn = noticeJa ? await translateJaText(noticeJa, 'en') : '';
          footerNotice = {
            ja: noticeJa,
            en: noticeEn,
            highlight,
            blink
          };

          pushHistorySnapshot();
          saveAdminState();
          await publishSharedStateWithNote(note, '注意事項を保存しました（JP/EN）');
          updateFooterNotice();
          updateStatus();
          syncHistoryButtons();

          noticeSaveButton.disabled = false;
        }

        async function resetCurrent() {
          const no = String(noField.value);
          delete rowSettings[no];
          pushHistorySnapshot();
          saveAdminState();
          await publishSharedStateWithNote(note, '初期化しました');
          applyForm(no);
          renderBoard();
          updateStatus();
          syncHistoryButtons();
          saveButton.disabled = false;
          resetButton.disabled = false;
        }

        async function deleteCurrent() {
          const no = String(noField.value);
          const numericNo = Number(no);
          if (!no) {
            note.textContent = '削除対象がありません';
            return;
          }

          if (hiddenNos.has(numericNo)) {
            hiddenNos.delete(numericNo);
            note.textContent = `No.${no} を復元しました`;
          } else {
            hiddenNos.add(numericNo);
            note.textContent = `No.${no} を削除しました（一つ戻すで復元可能）`;
          }

          pushHistorySnapshot();
          saveAdminState();
          await publishSharedStateWithNote(note, note.textContent);
          renderBoard();
          updateStatus();
          refreshNoOptions(no);
          applyForm(noField.value);
          syncHistoryButtons();
        }

        async function addNewRow() {
          const requestedNo = Number(addNoField.value);
          const speakerJa = addSpeakerField.value.trim();
          const titleJa = addTitleField.value.trim();
          const statusJa = addStatusField.value || '開演前';
          const time = addTimeField.value.trim() || '--:--';
          const placeJa = addPlaceField.value.trim() || '体育館';
          const statusCode = statusCodeFromJa(statusJa, 'checkin');

          if (!speakerJa || !titleJa) {
            note.textContent = '追加には「公演者」と「開演名」が必要です';
            return;
          }

          addButton.disabled = true;
          note.textContent = '追加情報を翻訳中...';

          const [speakerI18n, titleI18n, statusI18n, gatesI18n] = await Promise.all([
            buildAutoTranslations(speakerJa),
            buildAutoTranslations(titleJa),
            buildAutoTranslations(statusJa),
            buildAutoTranslations(placeJa)
          ]);

          let no = nextRowNo();
          if (Number.isFinite(requestedNo) && requestedNo > 0) {
            const normalizedNo = Math.trunc(requestedNo);
            const alreadyUsed = getAllAdminFlights().some((entry) => Number(entry.no) === normalizedNo);
            if (alreadyUsed) {
              addButton.disabled = false;
              note.textContent = `No.${normalizedNo} は既に使われています`;
              return;
            }
            no = normalizedNo;
          }

          customRows.push({
            no,
            speaker: { ja: speakerJa, ...speakerI18n },
            time,
            status: statusCode,
            gates: { ja: placeJa, ...gatesI18n },
            titles: { ja: titleJa, ...titleI18n },
            statuses: { ja: statusJa, ...statusI18n }
          });

          pushHistorySnapshot();
          saveAdminState();
          await publishSharedStateWithNote(note, `No.${no} を追加しました`);
          renderBoard();
          updateStatus();
          refreshNoOptions(no);
          applyForm(no);
          syncHistoryButtons();

          addSpeakerField.value = '';
          addTitleField.value = '';
          addStatusField.value = '開演前';
          addTimeField.value = '--:--';
          addPlaceField.value = '体育館';
          addNoField.value = '';
          addButton.disabled = false;
        }

        async function undoCurrent() {
          if (historyIndex <= 0) {
            note.textContent = 'これ以上戻せません';
            return;
          }

          historyIndex -= 1;
          restoreAdminStateSnapshot(historyStack[historyIndex]);
          saveAdminState();
          await publishSharedStateWithNote(note, '1つ前の状態に戻しました');
          refreshNoOptions(noField.value);
          applyForm(noField.value);
          renderBoard();
          updateStatus();
          syncHistoryButtons();
        }

        async function redoCurrent() {
          if (historyIndex >= historyStack.length - 1) {
            note.textContent = 'これ以上やり直せません';
            return;
          }

          historyIndex += 1;
          restoreAdminStateSnapshot(historyStack[historyIndex]);
          saveAdminState();
          await publishSharedStateWithNote(note, '戻した操作をやり直しました');
          refreshNoOptions(noField.value);
          applyForm(noField.value);
          renderBoard();
          updateStatus();
          syncHistoryButtons();
        }

        async function configureSyncToken() {
          const current = getSyncToken();
          const input = window.prompt('GitHubトークンを入力（repo権限）。削除する場合は空欄でOK', current);
          if (input === null) {
            return;
          }
          const token = input.trim();
          if (token) {
            window.localStorage.setItem(SYNC_TOKEN_KEY, token);
            await publishSharedStateWithNote(note, '公開同期トークンを保存しました');
          } else {
            window.localStorage.removeItem(SYNC_TOKEN_KEY);
            note.textContent = '公開同期トークンを削除しました';
          }
        }

        openButton.addEventListener('click', openPanel);
        closeButton.addEventListener('click', closePanel);
        noField.addEventListener('change', () => applyForm(noField.value));
        saveButton.addEventListener('click', saveCurrent);
        delaySaveButton.addEventListener('click', saveDelaySetting);
        syncTokenButton.addEventListener('click', configureSyncToken);
        resetButton.addEventListener('click', resetCurrent);
        deleteButton.addEventListener('click', deleteCurrent);
        addButton.addEventListener('click', addNewRow);
        noticeSaveButton.addEventListener('click', saveNoticeSetting);
        undoButton.addEventListener('click', undoCurrent);
        redoButton.addEventListener('click', redoCurrent);
        syncHistoryButtons();
      }

      function renderBoard() {
        renderHeaders();
        const allRows = getDisplayFlights();
        const midpoint = Math.ceil(allRows.length / 2);
        rows.innerHTML = allRows.slice(0, midpoint).map(makeRow).join('');
        rows2.innerHTML = allRows.slice(midpoint).map((item, index) => makeRow(item, index + midpoint)).join('');
        updateFooterNotice();
      }

      function updateStatus() {
        const stamp = new Date();
        const delayText = globalDelayMinutes === 0
          ? ''
          : (globalDelayMinutes > 0 ? ` / 遅延 +${globalDelayMinutes}分` : ` / 早発 ${Math.abs(globalDelayMinutes)}分`);
        lastUpdate.textContent = `更新 ${stamp.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })} / ${currentLanguage().label}${delayText}`;
      }

      function advanceLanguage() {
        currentLanguageIndex = (currentLanguageIndex + 1) % languages.length;
        renderBoard();
        updateStatus();

        const duration = currentLanguage().key === 'ja' ? 10000 : 5000;
        languageTimer = window.setTimeout(advanceLanguage, duration);
      }

      function advanceNoticeLanguage() {
        currentNoticeLanguageIndex = (currentNoticeLanguageIndex + 1) % noticeLanguages.length;
        updateFooterNotice();

        const duration = currentNoticeLanguage().key === 'ja' ? 10000 : 5000;
        noticeLanguageTimer = window.setTimeout(advanceNoticeLanguage, duration);
      }

      renderClock();
      renderBoard();
      updateStatus();
      setupAdminPanel();
      pullSharedState();

      window.addEventListener('storage', (event) => {
        if (event.key === ADMIN_STORAGE_KEY) {
          syncStateFromStorage();
        }
      });

      // iPad/Safari: foreground復帰時に即同期して遅延を最小化する。
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          pullSharedState();
        }
      });
      window.addEventListener('focus', () => {
        pullSharedState();
      });

      setInterval(renderClock, 1000);
      setInterval(updateStatus, 15000);
      setInterval(pullSharedState, 2000);
      languageTimer = window.setTimeout(advanceLanguage, 10000);
      noticeLanguageTimer = window.setTimeout(advanceNoticeLanguage, 10000);
    </script>
  </body>
</html>
